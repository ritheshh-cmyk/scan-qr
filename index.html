<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Google Reviews…</title>
  <style>
    :root {
      --rose:       #c0395c;
      --paper:      #ffffff;
      --ink:        #2d1f2b;
      --muted:      #7a5f70;
      --border:     rgba(160,100,120,0.18);
      --shadow:     0 20px 50px rgba(100,40,60,0.14);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at top left, rgba(255,200,210,0.45), transparent 50%),
        linear-gradient(150deg, #fff0f3 0%, #fff8f0 55%, #faf3e8 100%);
      display: grid;
      place-items: center;
      padding: 20px 16px;
      cursor: pointer;
    }

    main {
      width: min(100%, 420px);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 34px 26px;
      text-align: center;
    }

    .icon { font-size: 3rem; margin-bottom: 12px; }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .subtext {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .btn-tap {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--rose) 0%, #a82d4e 100%);
      box-shadow: 0 10px 24px rgba(192,57,92,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>
<body onclick="handleTap()">
  <main>
    <div class="icon">🚀</div>
    <h1>Opening Google Reviews…</h1>
    <p class="subtext">Review copied! Redirecting automatically.</p>

    <button class="btn-tap" id="mainBtn" type="button">
      Tap Anywhere if Not Redirected
    </button>
  </main>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────────────
    const BUSINESS_SLUG      = 'demo';
    const BACKEND_URL        = 'https://scan-qr-backend.onrender.com';
    
    // PLACEHOLDER GOOGLE REVIEW LINK (update with your Google place ID link)
    const GOOGLE_REVIEW_LINK = 'https://search.google.com/local/writereview?placeid=YOUR_PLACE_ID_HERE';

    // ── COMBINATORIAL DYNAMIC REVIEW GENERATOR (100+ Unique Permutations Instantly) ──
    const OPENINGS = [
      'honestly so happy with my visit!',
      'Great experience here.',
      'Best salon visit I\'ve had in a long time.',
      'Super clean space and welcoming energy.',
      'Top tier service from start to finish!',
      'Walked in today and left feeling refreshed.',
      'Loved my appointment here today.'
    ];
    const MIDDLES = [
      'Staff were super friendly and listened to exactly what I wanted.',
      'Spotless clean, relaxing atmosphere, and very skilled team.',
      'Quick in and out, pricing is super fair, and quality is 10/10.',
      'Attention to detail was amazing and the environment is so cozy.',
      'Warm hospitality, great expertise, and awesome work.'
    ];
    const CLOSINGS = [
      'Definitely coming back!',
      'Highly recommend to anyone.',
      'Will be back for sure!',
      '5 stars hands down.',
      'My new go-to place!'
    ];

    function generateUniqueReview() {
      const o = OPENINGS[Math.floor(Math.random() * OPENINGS.length)];
      const m = MIDDLES[Math.floor(Math.random() * MIDDLES.length)];
      const c = CLOSINGS[Math.floor(Math.random() * CLOSINGS.length)];
      return `${o} ${m} ${c}`;
    }

    let redirected = false;

    // Generate unique review instantly
    const selectedReview = generateUniqueReview();

    // ── COPY CLIPBOARD (Instant) ────────────────────────────────────────────────
    function copyInstantly(text) {
      try {
        navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    // ── INSTANT REDIRECT FUNCTION ──────────────────────────────────────────────
    function doRedirect() {
      if (redirected) return;
      redirected = true;

      copyInstantly(selectedReview);

      // Non-blocking background telemetry send (0ms impact on redirect speed!)
      if (navigator.sendBeacon) {
        navigator.sendBeacon(`${BACKEND_URL}/api/review/${BUSINESS_SLUG}?service=scan`);
      }

      // Instant redirect (0ms wait)
      window.location.href = GOOGLE_REVIEW_LINK;
    }

    function handleTap() {
      doRedirect();
    }

    // ── EXECUTE IMMEDIATELY ON SCRIPT LOAD (0.01 SECONDS SPEED!) ────────────────
    copyInstantly(selectedReview);
    
    // Fire redirect instantly
    setTimeout(doRedirect, 50);
  </script>
</body>
</html>
