<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Salon Feedback</title>
  <style>
    :root {
      --rose:       #c0395c;
      --rose-dark:  #9b2847;
      --rose-light: rgba(192,57,92,0.12);
      --gold:       #8a6c3e;
      --cream:      #fff8f0;
      --paper:      #fffcf9;
      --ink:        #2d1f2b;
      --muted:      #7a5f70;
      --ring:       rgba(192,57,92,0.22);
      --shadow:     0 18px 48px rgba(100,40,60,0.13);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at top left, rgba(255,200,210,0.35), transparent 40%),
        radial-gradient(ellipse at bottom right, rgba(255,230,190,0.3), transparent 40%),
        linear-gradient(150deg, #fff0f3 0%, #fff8f0 55%, #faf3e8 100%);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    main {
      width: min(100%, 450px);
      background: var(--paper);
      border: 1px solid rgba(160,100,120,0.14);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 30px 24px;
    }

    .kicker {
      margin: 0 0 10px;
      color: var(--rose);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 7vw, 2.2rem);
      line-height: 1.1;
      font-weight: 800;
    }

    .subtext {
      margin: 12px 0 24px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.55;
    }

    button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 10px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease, opacity 150ms;
      touch-action: manipulation;
    }

    button:focus-visible,
    textarea:focus-visible {
      outline: 4px solid var(--ring);
      outline-offset: 3px;
    }

    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--rose) 0%, #a82d4e 100%);
      box-shadow: 0 8px 24px rgba(192,57,92,0.28);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 150ms;
    }

    .btn-primary:hover:not(:disabled)::after { background: rgba(255,255,255,0.07); }

    .btn-secondary {
      margin-top: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--gold) 0%, #6e5230 100%);
      box-shadow: 0 8px 24px rgba(138,108,62,0.22);
    }

    .btn-secondary:hover:not(:disabled) { background: linear-gradient(135deg, #7a5e33 0%, #5c4327 100%); }

    .review-area {
      display: none;
      margin-top: 20px;
    }

    .review-area.visible { display: block; }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border: 1px solid rgba(120,70,90,0.2);
      border-radius: 10px;
      background: var(--cream);
      color: var(--ink);
      padding: 14px;
      font: inherit;
      font-size: 0.96rem;
      line-height: 1.5;
    }

    .status {
      min-height: 20px;
      margin: 10px 0 0;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--rose);
    }

    /* Loading state */
    .loading-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(192,57,92,0.2);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* AI badge */
    .ai-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--rose);
      background: var(--rose-light);
      border: 1px solid rgba(192,57,92,0.2);
      border-radius: 20px;
      padding: 2px 10px;
      margin-bottom: 8px;
      width: fit-content;
    }

    .ai-badge.visible { display: inline-flex; }

    @media (min-width: 560px) {
      main { padding: 36px 32px; }
    }
  </style>
</head>
<body>
  <main>
    <p class="kicker">✨ Quick Feedback</p>
    <h1 id="heading">Loading…</h1>
    <p class="subtext">One tap — we'll generate your review. Copy and share it on Google.</p>

    <button class="btn-primary" id="rateBtn" type="button" disabled>
      <span id="btnText">✨ Generate My Review</span>
      <span id="btnSpinner" style="display:none" class="loading-wrap"><span class="spinner"></span> Generating…</span>
    </button>

    <section class="review-area" id="reviewArea" aria-live="polite">
      <div class="ai-badge" id="aiBadge">⚡ AI Generated</div>
      <label for="reviewText">Your review — feel free to edit</label>
      <textarea id="reviewText"></textarea>
      <button class="btn-secondary" id="copyBtn" type="button">📋 Copy & Open Google</button>
      <p class="status" id="statusMsg" role="status"></p>
    </section>
  </main>

  <script>
    // ── CONFIG — only these 2 lines change per business deployment ──────────────
    const BUSINESS_SLUG = 'demo';
    const BACKEND_URL   = 'https://scan-qr-backend.onrender.com';

    // ── FALLBACK SALON REVIEWS (used when backend/AI unavailable) ───────────────
    const FALLBACK = {
      name:            'Our Salon',
      googleReviewLink:'https://search.google.com/local/writereview',
      type:            'salon',
      reviews: [
        'Absolutely loved my experience here! The staff were warm, professional, and knew exactly what I wanted. The salon was spotless and the atmosphere was so relaxing. Great value for the quality of service — will definitely come back!',
        'The team here is incredible. My hair has never looked better, and everyone made me feel so welcome. Clean, cozy, and very skilled stylists. 100% recommend to anyone looking for a reliable and talented salon.',
        'Such a lovely salon! The service was top-notch from start to finish. My stylist listened carefully and delivered exactly what I asked for. Very reasonable pricing for the outstanding work they do. Highly recommended!',
        'I had a fantastic experience — the salon is beautifully maintained, the staff are friendly and talented, and the result exceeded my expectations. A hidden gem that I'll keep coming back to for sure!',
        'One of the best salon visits I've had. The attention to detail was remarkable, the products used were high quality, and I left feeling completely transformed. The team is genuinely passionate about their craft.'
      ]
    };

    // ── STATE ───────────────────────────────────────────────────────────────────
    let config         = null;
    let lastReviewIdx  = -1;
    let backendOnline  = false;

    const heading    = document.getElementById('heading');
    const rateBtn    = document.getElementById('rateBtn');
    const btnText    = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const reviewArea = document.getElementById('reviewArea');
    const reviewText = document.getElementById('reviewText');
    const copyBtn    = document.getElementById('copyBtn');
    const statusMsg  = document.getElementById('statusMsg');
    const aiBadge    = document.getElementById('aiBadge');

    // ── BOOT: show fallback immediately, check backend in background ──────────
    function init() {
      // 1. Instantly render fallback config — zero waiting for user
      config = FALLBACK;
      heading.textContent = `How was your experience at ${FALLBACK.name}?`;
      rateBtn.disabled    = false;

      // 2. Silently fetch backend config in background with short 4s timeout
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 4000);

      fetch(`${BACKEND_URL}/api/config/${BUSINESS_SLUG}`, { signal: controller.signal })
        .then(r => { clearTimeout(timer); return r.ok ? r.json() : null; })
        .then(data => {
          if (data && data.name) {
            config        = data;
            backendOnline = true;
            heading.textContent = `How was your experience at ${config.name}?`;
          }
        })
        .catch(() => {
          backendOnline = false;
        });
    }

    // ── Generate review ─────────────────────────────────────────────────────────
    async function generateReview() {
      rateBtn.disabled         = true;
      btnText.style.display    = 'none';
      btnSpinner.style.display = 'flex';

      let review      = null;
      let aiGenerated = false;

      // Only attempt network AI generation if backend is known to be online
      if (backendOnline) {
        try {
          const ctrl = new AbortController();
          const t    = setTimeout(() => ctrl.abort(), 4000); // 4s timeout max for AI
          const r    = await fetch(`${BACKEND_URL}/api/review/${BUSINESS_SLUG}`, { signal: ctrl.signal });
          clearTimeout(t);
          if (r.ok) {
            const data = await r.json();
            if (data.generated && data.review) {
              review      = data.review;
              aiGenerated = true;
            }
          }
        } catch {
          // If fetch fails or times out, mark backend offline for future clicks
          backendOnline = false;
        }
      }

      // If AI review not fetched or backend unavailable, instantly use preloaded message
      if (!review) {
        const pool = config?.reviews || FALLBACK.reviews;
        let idx    = Math.floor(Math.random() * pool.length);
        while (pool.length > 1 && idx === lastReviewIdx) {
          idx = Math.floor(Math.random() * pool.length);
        }
        lastReviewIdx = idx;
        review        = pool[idx];
      }

      // Render result
      reviewText.value = review;
      reviewArea.classList.add('visible');
      aiBadge.classList.toggle('visible', aiGenerated);
      reviewText.focus();

      rateBtn.disabled         = false;
      btnText.style.display    = '';
      btnSpinner.style.display = 'none';
      btnText.textContent      = '↻ New Review';
    }

    // ── Copy + open Google ──────────────────────────────────────────────────────
    async function copyAndOpen() {
      const text = reviewText.value.trim();
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        reviewText.select();
        document.execCommand('copy');
      }
      statusMsg.textContent = '✅ Copied! Paste it on the Google page that just opened.';
      const link = config?.googleReviewLink || FALLBACK.googleReviewLink;
      window.open(link, '_blank', 'noopener,noreferrer');
    }

    rateBtn.addEventListener('click', generateReview);
    copyBtn.addEventListener('click', copyAndOpen);

    init();
  </script>
</body>
</html>
