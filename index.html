<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="pageTitle">Opening Google Reviews…</title>
  <style>
    :root {
      --rose:       #c0395c;
      --paper:      #ffffff;
      --ink:        #2d1f2b;
      --muted:      #7a5f70;
      --border:     rgba(160,100,120,0.18);
      --shadow:     0 20px 50px rgba(100,40,60,0.14);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at top left, rgba(255,200,210,0.45), transparent 50%),
        linear-gradient(150deg, #fff0f3 0%, #fff8f0 55%, #faf3e8 100%);
      display: grid;
      place-items: center;
      padding: 20px 16px;
      cursor: pointer;
    }

    main {
      width: min(100%, 420px);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 34px 26px;
      text-align: center;
    }

    .icon { font-size: 3rem; margin-bottom: 12px; }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .subtext {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .btn-tap {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--rose) 0%, #a82d4e 100%);
      box-shadow: 0 10px 24px rgba(192,57,92,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>
<body onclick="handleTap()">
  <main>
    <div class="icon" id="bizIcon">🛍️</div>
    <h1 id="heading">Opening Google Reviews…</h1>
    <p class="subtext">Review copied! Redirecting automatically.</p>

    <button class="btn-tap" id="mainBtn" type="button">
      Tap Anywhere if Not Redirected
    </button>
  </main>

  <script>
    // ── UNIVERSAL MULTI-BUSINESS CONFIG & SLUG ROUTER ──────────────────────────
    const urlParams     = new URLSearchParams(window.location.search);
    const BUSINESS_SLUG = urlParams.get('biz') || urlParams.get('slug') || urlParams.get('business') || 'saloon';
    const BACKEND_URL    = 'https://scan-qr-backend.onrender.com';
    
    // DEFAULT PLACEHOLDER GOOGLE REVIEW LINK (overridden dynamically by business config)
    let googleReviewLink = 'https://search.google.com/local/writereview?placeid=YOUR_PLACE_ID';

    // ── UNIVERSAL CATEGORY ICONS ───────────────────────────────────────────────
    function getCategoryIcon(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('mandi')) return '🍗';
      if (t.includes('saloon') || t.includes('barber')) return '💈';
      if (t.includes('salon') || t.includes('hair') || t.includes('beauty')) return '💇‍♀️';
      if (t.includes('spa') || t.includes('massage')) return '🧖‍♀️';
      if (t.includes('cafe') || t.includes('coffee') || t.includes('bakery')) return '☕';
      if (t.includes('food') || t.includes('restaurant') || t.includes('dining')) return '🍽️';
      if (t.includes('clothing') || t.includes('fashion') || t.includes('wear') || t.includes('boutique')) return '👗';
      if (t.includes('gym') || t.includes('fitness') || t.includes('workout')) return '💪';
      return '🛍️';
    }

    // ── COMBINATORIAL HUMAN REVIEW FALLBACK ────────────────────────────────────
    const OPENINGS = [
      'honestly so happy with my visit!',
      'Great experience here.',
      'Best customer service and quality I\'ve had in a long time.',
      'Super clean space and welcoming energy.',
      'Top tier service from start to finish!',
      'Walked in today and left feeling super satisfied.',
      'Loved my experience here today.'
    ];
    const MIDDLES = [
      'Staff were super friendly and listened to exactly what I wanted.',
      'Spotless clean, relaxing atmosphere, and very skilled team.',
      'Quick in and out, pricing is super fair, and quality is top tier.',
      'Attention to detail was amazing and the environment is so comfortable.',
      'Warm hospitality, great expertise, and awesome quality.'
    ];
    const CLOSINGS = [
      'Definitely coming back!',
      'Highly recommend to everyone.',
      'Will be back for sure!',
      '5 stars hands down.',
      'My new favorite place!'
    ];

    function generateUniqueReview() {
      const o = OPENINGS[Math.floor(Math.random() * OPENINGS.length)];
      const m = MIDDLES[Math.floor(Math.random() * MIDDLES.length)];
      const c = CLOSINGS[Math.floor(Math.random() * CLOSINGS.length)];
      return `${o} ${m} ${c}`;
    }

    let activeReview = generateUniqueReview();
    let redirected   = false;
    let redirectAttempted = false;

    // ── ASYNC COPY CLIPBOARD ENGINE (With gesture fallback check) ───────────────
    async function copyReviewToClipboard(text) {
      // 1. Try modern clipboard API
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (e) {
          // Fallback
        }
      }

      // 2. Try legacy input selection method
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, 99999); // Safe for mobile Safari/Chrome
        const success = document.execCommand('copy');
        document.body.removeChild(ta);
        if (success) return true;
      } catch (err) {
        // Fail
      }

      return false;
    }

    // ── SMART REDIRECT ENGINE ──────────────────────────────────────────────────
    async function attemptRedirect(isUserClicked) {
      if (redirected) return;

      const copied = await copyReviewToClipboard(activeReview);

      if (copied || isUserClicked) {
        redirected = true;
        window.location.href = googleReviewLink;
      } else {
        // Copy failed because browser blocked writing without user gesture
        if (!redirectAttempted) {
          redirectAttempted = true;
          document.getElementById('heading').textContent = "Tap to Copy & Continue";
          document.querySelector('.subtext').textContent = "Review copied! Tap below to open Google Reviews.";
          const mainBtn = document.getElementById('mainBtn');
          mainBtn.textContent = "Tap to Copy & Continue 🚀";
          mainBtn.style.background = "linear-gradient(135deg, #10b981 0%, #059669 100%)";
          mainBtn.style.boxShadow = "0 10px 24px rgba(16, 185, 129, 0.4)";
        }
      }
    }

    function handleTap() {
      attemptRedirect(true);
    }

    // ── DYNAMICALLY LOAD BUSINESS CONFIG & REVIEW IN PARALLEL ──────────────────
    Promise.all([
      fetch(`${BACKEND_URL}/api/config/${BUSINESS_SLUG}`).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`${BACKEND_URL}/api/review/${BUSINESS_SLUG}`).then(r => r.ok ? r.json() : null).catch(() => null)
    ]).then(([cfg, revData]) => {
      if (cfg) {
        if (cfg.googleReviewLink && cfg.googleReviewLink.trim()) {
          googleReviewLink = cfg.googleReviewLink.trim();
        }
        if (cfg.name) {
          document.getElementById('heading').textContent = `Opening ${cfg.name} Reviews…`;
          document.getElementById('pageTitle').textContent = `Opening ${cfg.name} Reviews…`;
        }
        if (cfg.type) {
          document.getElementById('bizIcon').textContent = getCategoryIcon(cfg.type);
        }
      }
      if (revData && revData.review) {
        activeReview = revData.review;
      }
      attemptRedirect(false);
    }).catch(() => {
      attemptRedirect(false);
    });

    // ── SAFETY FALLBACK TIMER (1500ms max in case of network latency) ──────────
    setTimeout(() => attemptRedirect(false), 1500);
  </script>
</body>
</html>
