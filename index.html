<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title id="pageTitle">Opening Google Reviews…</title>
  <style>
    :root {
      --rose:       #c0395c;
      --paper:      #ffffff;
      --ink:        #2d1f2b;
      --muted:      #7a5f70;
      --border:     rgba(160,100,120,0.18);
      --shadow:     0 20px 50px rgba(100,40,60,0.14);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at top left, rgba(255,200,210,0.45), transparent 50%),
        linear-gradient(150deg, #fff0f3 0%, #fff8f0 55%, #faf3e8 100%);
      display: grid;
      place-items: center;
      padding: 20px 16px;
      cursor: pointer;
    }

    main {
      width: min(100%, 420px);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 34px 26px;
      text-align: center;
    }

    .icon { font-size: 3rem; margin-bottom: 12px; }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .subtext {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .btn-tap {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--rose) 0%, #a82d4e 100%);
      box-shadow: 0 10px 24px rgba(192,57,92,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .stars-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      font-size: 1.8rem;
      margin: 10px 0 24px;
    }

    .stars-row span {
      display: inline-block;
      animation: starPulse 1.8s infinite ease-in-out;
    }

    .stars-row span:nth-child(2) { animation-delay: 0.15s; }
    .stars-row span:nth-child(3) { animation-delay: 0.3s; }
    .stars-row span:nth-child(4) { animation-delay: 0.45s; }
    .stars-row span:nth-child(5) { animation-delay: 0.6s; }

    @keyframes starPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(250,204,21,0.2)); }
      50% { transform: scale(1.22); filter: drop-shadow(0 0 8px rgba(250,204,21,0.6)); }
    }
  </style>
</head>
<body>
  <main>
    <div class="icon" id="bizIcon">🛍️</div>
    <h1 id="heading">Opening Google Reviews…</h1>
    <p class="subtext" id="subtext">Review copied! Redirecting automatically.</p>

    <div class="stars-row" id="starsRow">
      <span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
    </div>

    <button class="btn-tap" id="mainBtn" type="button">
      Tap Anywhere if Not Redirected
    </button>
  </main>

  <script>
    // ── UNIVERSAL MULTI-BUSINESS CONFIG & SLUG ROUTER ──────────────────────────
    const urlParams     = new URLSearchParams(window.location.search);
    const BUSINESS_SLUG = urlParams.get('biz') || urlParams.get('slug') || urlParams.get('business') || 'saloon';
    const BACKEND_URL    = 'https://scan-qr-backend.onrender.com';
    
    // DEFAULT PLACEHOLDER GOOGLE REVIEW LINK (overridden dynamically by business config)
    let googleReviewLink = 'https://search.google.com/local/writereview?placeid=YOUR_PLACE_ID';

    // ── UNIVERSAL CATEGORY ICONS ───────────────────────────────────────────────
    function getCategoryIcon(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('mandi')) return '🍗';
      if (t.includes('saloon') || t.includes('barber')) return '💈';
      if (t.includes('salon') || t.includes('hair') || t.includes('beauty')) return '💇‍♀️';
      if (t.includes('spa') || t.includes('massage')) return '🧖‍♀️';
      if (t.includes('cafe') || t.includes('coffee') || t.includes('bakery')) return '☕';
      if (t.includes('food') || t.includes('restaurant') || t.includes('dining')) return '🍽️';
      if (t.includes('clothing') || t.includes('fashion') || t.includes('wear') || t.includes('boutique')) return '👗';
      if (t.includes('gym') || t.includes('fitness') || t.includes('workout')) return '💪';
      return '🛍️';
    }

    // ── COMBINATORIAL HUMAN REVIEW FALLBACK ────────────────────────────────────
    const OPENINGS = [
      'honestly so happy with my visit!',
      'Great experience here.',
      'Best customer service and quality I\'ve had in a long time.',
      'Super clean space and welcoming energy.',
      'Top tier service from start to finish!',
      'Walked in today and left feeling super satisfied.',
      'Loved my experience here today.'
    ];
    const MIDDLES = [
      'Staff were super friendly and listened to exactly what I wanted.',
      'Spotless clean, relaxing atmosphere, and very skilled team.',
      'Quick in and out, pricing is super fair, and quality is top tier.',
      'Attention to detail was amazing and the environment is so comfortable.',
      'Warm hospitality, great expertise, and awesome quality.'
    ];
    const CLOSINGS = [
      'Definitely coming back!',
      'Highly recommend to everyone.',
      'Will be back for sure!',
      '5 stars hands down.',
      'My new favorite place!'
    ];

    function generateUniqueReview() {
      const o = OPENINGS[Math.floor(Math.random() * OPENINGS.length)];
      const m = MIDDLES[Math.floor(Math.random() * MIDDLES.length)];
      const c = CLOSINGS[Math.floor(Math.random() * CLOSINGS.length)];
      return `${o} ${m} ${c}`;
    }

    let activeReview = generateUniqueReview();
    let redirected   = false;
    let redirectAttempted = false;

    // ── DUAL CLIPBOARD COPY ENGINE (Ensures iOS/Android reliability in click gesture) ──
    function fallbackCopySync(text) {
      try {
        const el = document.createElement('textarea');
        el.value = text;
        el.addEventListener('keydown', function(e) { e.preventDefault(); });
        el.style.position = 'absolute';
        el.style.left = '-9999px';
        el.style.top = (window.pageYOffset || document.documentElement.scrollTop) + 'px';
        document.body.appendChild(el);
        
        el.focus();
        el.select();
        el.setSelectionRange(0, 999999);
        
        const success = document.execCommand('copy');
        document.body.removeChild(el);
        return success;
      } catch (err) {
        console.error('Fallback copy failed: ', err);
        return false;
      }
    }

    function copyReviewToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text)
          .then(() => true)
          .catch((err) => {
            console.warn('Modern copy failed, trying fallback:', err);
            return fallbackCopySync(text);
          });
      }
      return Promise.resolve(fallbackCopySync(text));
    }

    // ── SMART REDIRECT ENGINE ──────────────────────────────────────────────────
    function handleTap() {
      if (redirected) return;
      redirected = true;

      // Show status feedback
      document.getElementById('heading').textContent = "Copying Review…";
      document.getElementById('subtext').textContent = "Review copied! Opening Google Reviews.";
      const mainBtn = document.getElementById('mainBtn');
      mainBtn.textContent = "Opening... 🚀";
      mainBtn.style.background = "linear-gradient(135deg, #10b981 0%, #059669 100%)";
      mainBtn.style.boxShadow = "0 10px 24px rgba(16, 185, 129, 0.4)";
      
      // Copy to clipboard synchronously in gesture, then redirect inside resolve
      copyReviewToClipboard(activeReview).then(() => {
        window.location.href = googleReviewLink;
      }).catch(() => {
        window.location.href = googleReviewLink;
      });
    }

    // ── CACHED LOCAL FALLBACKS (Resolves network failure / offline edge cases) ──
    const localCachedLink = localStorage.getItem(`biz_link_${BUSINESS_SLUG}`);
    const localCachedName = localStorage.getItem(`biz_name_${BUSINESS_SLUG}`);
    const localCachedType = localStorage.getItem(`biz_type_${BUSINESS_SLUG}`);
    const localCachedReview = localStorage.getItem(`biz_review_${BUSINESS_SLUG}`);

    if (localCachedLink && localCachedLink.trim()) {
      googleReviewLink = localCachedLink.trim();
    }
    if (localCachedName && localCachedName.trim()) {
      document.getElementById('heading').textContent = `Review ${localCachedName}`;
      document.getElementById('pageTitle').textContent = `Review ${localCachedName}`;
    }
    if (localCachedType) {
      document.getElementById('bizIcon').textContent = getCategoryIcon(localCachedType);
    }
    if (localCachedReview && localCachedReview.trim()) {
      activeReview = localCachedReview.trim();
    }

    // Initialize default UI text
    if (!localCachedName) {
      document.getElementById('heading').textContent = "Tap to Write Review";
    }
    document.getElementById('subtext').textContent = "Tap anywhere to copy your 5-star review and redirect.";
    const mainBtn = document.getElementById('mainBtn');
    mainBtn.textContent = "Copy Review & Continue 🚀";
    mainBtn.style.background = "linear-gradient(135deg, #10b981 0%, #059669 100%)";
    mainBtn.style.boxShadow = "0 10px 24px rgba(16, 185, 129, 0.4)";

    // Bind click event listener directly to window to bypass iOS Safari non-interactive element bubbling restriction
    // and resolve accidental redirects during scroll/swipes (touchstart event)
    window.addEventListener('click', handleTap);

    // ── DYNAMICALLY LOAD BUSINESS CONFIG & REVIEW IN PARALLEL ──────────────────
    Promise.all([
      fetch(`${BACKEND_URL}/api/config/${BUSINESS_SLUG}`).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`${BACKEND_URL}/api/review/${BUSINESS_SLUG}`).then(r => r.ok ? r.json() : null).catch(() => null)
    ]).then(([cfg, revData]) => {
      if (cfg) {
        if (cfg.googleReviewLink && cfg.googleReviewLink.trim()) {
          googleReviewLink = cfg.googleReviewLink.trim();
          localStorage.setItem(`biz_link_${BUSINESS_SLUG}`, googleReviewLink);
        }
        if (cfg.name && cfg.name.trim()) {
          const cleanName = cfg.name.trim();
          document.getElementById('heading').textContent = `Review ${cleanName}`;
          document.getElementById('pageTitle').textContent = `Review ${cleanName}`;
          localStorage.setItem(`biz_name_${BUSINESS_SLUG}`, cleanName);
        }
        if (cfg.type) {
          document.getElementById('bizIcon').textContent = getCategoryIcon(cfg.type);
          localStorage.setItem(`biz_type_${BUSINESS_SLUG}`, cfg.type);
        }
      }
      if (revData && revData.review && revData.review.trim()) {
        activeReview = revData.review.trim();
        localStorage.setItem(`biz_review_${BUSINESS_SLUG}`, activeReview);
      }
    }).catch((e) => {
      console.warn("API fetch error, relying on cache/generator fallbacks:", e);
    });
  </script>
</body>
</html>
