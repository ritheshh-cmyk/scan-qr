<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="pageTitle">Opening Google Reviews…</title>
  <style>
    :root {
      --rose:       #c0395c;
      --paper:      #ffffff;
      --ink:        #2d1f2b;
      --muted:      #7a5f70;
      --border:     rgba(160,100,120,0.18);
      --shadow:     0 20px 50px rgba(100,40,60,0.14);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at top left, rgba(255,200,210,0.45), transparent 50%),
        linear-gradient(150deg, #fff0f3 0%, #fff8f0 55%, #faf3e8 100%);
      display: grid;
      place-items: center;
      padding: 20px 16px;
      cursor: pointer;
    }

    main {
      width: min(100%, 420px);
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 34px 26px;
      text-align: center;
    }

    .icon { font-size: 3rem; margin-bottom: 12px; }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .subtext {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .btn-tap {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--rose) 0%, #a82d4e 100%);
      box-shadow: 0 10px 24px rgba(192,57,92,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>
<body onclick="handleTap()">
  <main>
    <div class="icon" id="bizIcon">🛍️</div>
    <h1 id="heading">Opening Google Reviews…</h1>
    <p class="subtext">Review copied! Redirecting automatically.</p>

    <button class="btn-tap" id="mainBtn" type="button">
      Tap Anywhere if Not Redirected
    </button>
  </main>

  <script>
    // ── UNIVERSAL MULTI-BUSINESS CONFIG & SLUG ROUTER ──────────────────────────
    const urlParams     = new URLSearchParams(window.location.search);
    const BUSINESS_SLUG = urlParams.get('biz') || urlParams.get('slug') || urlParams.get('business') || 'saloon';
    const BACKEND_URL    = 'https://scan-qr-backend.onrender.com';
    
    // DEFAULT PLACEHOLDER GOOGLE REVIEW LINK (overridden dynamically by business config)
    let googleReviewLink = 'https://search.google.com/local/writereview?placeid=YOUR_PLACE_ID';

    // ── UNIVERSAL CATEGORY ICONS ───────────────────────────────────────────────
    function getCategoryIcon(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('clothing') || t.includes('fashion') || t.includes('apparel')) return '👗';
      if (t.includes('saloon') || t.includes('salon') || t.includes('hair')) return '💇‍♀️';
      if (t.includes('barber')) return '💈';
      if (t.includes('spa') || t.includes('massage')) return '🧖‍♀️';
      if (t.includes('food') || t.includes('restaurant') || t.includes('pizza')) return '🍕';
      if (t.includes('cafe') || t.includes('coffee')) return '☕';
      if (t.includes('dental') || t.includes('doctor')) return '🦷';
      if (t.includes('gym') || t.includes('fitness')) return '🏋️‍♂️';
      return '🛍️';
    }

    // ── COMBINATORIAL HUMAN REVIEW FALLBACK ────────────────────────────────────
    const OPENINGS = [
      'honestly so happy with my visit!',
      'Great experience here.',
      'Best customer service and quality I\'ve had in a long time.',
      'Super clean space and welcoming energy.',
      'Top tier service from start to finish!',
      'Walked in today and left feeling super satisfied.',
      'Loved my experience here today.'
    ];
    const MIDDLES = [
      'Staff were super friendly and listened to exactly what I wanted.',
      'Spotless clean, relaxing atmosphere, and very skilled team.',
      'Quick in and out, pricing is super fair, and quality is top tier.',
      'Attention to detail was amazing and the environment is so comfortable.',
      'Warm hospitality, great expertise, and awesome quality.'
    ];
    const CLOSINGS = [
      'Definitely coming back!',
      'Highly recommend to everyone.',
      'Will be back for sure!',
      '5 stars hands down.',
      'My new favorite place!'
    ];

    function generateUniqueReview() {
      const o = OPENINGS[Math.floor(Math.random() * OPENINGS.length)];
      const m = MIDDLES[Math.floor(Math.random() * MIDDLES.length)];
      const c = CLOSINGS[Math.floor(Math.random() * CLOSINGS.length)];
      return `${o} ${m} ${c}`;
    }

    let activeReview = generateUniqueReview();
    let redirected   = false;

    // ── COPY CLIPBOARD (Instant) ────────────────────────────────────────────────
    function copyInstantly(text) {
      try {
        navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    // ── INSTANT REDIRECT ENGINE ────────────────────────────────────────────────
    function doRedirect() {
      if (redirected) return;
      redirected = true;

      copyInstantly(activeReview);

      // Instant redirect
      window.location.href = googleReviewLink;
    }

    function handleTap() {
      doRedirect();
    }

    // ── DYNAMICALLY LOAD BUSINESS CONFIG FROM BACKEND ──────────────────────────
    fetch(`${BACKEND_URL}/api/config/${BUSINESS_SLUG}`)
      .then(r => r.ok ? r.json() : null)
      .then(cfg => {
        if (cfg) {
          if (cfg.googleReviewLink) googleReviewLink = cfg.googleReviewLink;
          if (cfg.name) {
            document.getElementById('heading').textContent = `Opening ${cfg.name} Reviews…`;
            document.getElementById('pageTitle').textContent = `Opening ${cfg.name} Reviews…`;
          }
          if (cfg.type) {
            document.getElementById('bizIcon').textContent = getCategoryIcon(cfg.type);
          }
        }
      })
      .catch(() => {});

    // ── FETCH FIFO QUEUE REVIEW FROM BACKEND (Pops Gemini AI review from buffer) ─
    fetch(`${BACKEND_URL}/api/review/${BUSINESS_SLUG}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && data.review) {
          activeReview = data.review;
        }
        doRedirect();
      })
      .catch(() => {
        doRedirect();
      });

    // ── MAXIMUM SAFETY TIMER (150ms timeout to guarantee sub-150ms speed!) ────
    setTimeout(doRedirect, 150);
  </script>
</body>
</html>
